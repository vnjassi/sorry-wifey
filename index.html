<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am Sorry My Jaan ❤️</title>
    <style>
        :root { --primary-pink: #ff4d6d; --soft-cream: #fff0f3; }
        body { margin: 0; padding: 0; background-color: var(--soft-cream); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; color: #333; }
        .heart { position: fixed; color: var(--primary-pink); font-size: 20px; z-index: 999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
        .bird { position: fixed; font-size: 30px; z-index: 100; animation: fly 15s linear infinite; }
        @keyframes fly { 0% { left: -50px; top: 20%; } 50% { top: 50%; } 100% { left: 110vw; top: 10%; } }
        .container { max-width: 800px; margin: 0 auto; text-align: center; padding: 50px 20px; background: rgba(255, 255, 255, 0.8); box-shadow: 0 0 30px rgba(0,0,0,0.1); position: relative; z-index: 10; border-radius: 20px; }
        h1 { color: var(--primary-pink); font-size: 2.5rem; }
        .puppy-box img { width: 200px; border-radius: 15px; margin: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); }
        .sorry-counter { height: 300px; overflow-y: scroll; border: 2px solid var(--primary-pink); margin: 30px 0; padding: 15px; background: #fff; border-radius: 10px; text-align: left; }
        .regret-note { text-align: justify; line-height: 1.8; padding: 25px; background: #ffe5ec; border-radius: 15px; margin-top: 40px; font-size: 1.1rem; border-left: 5px solid var(--primary-pink); }
    </style>
</head>
<body>
    <div class="bird">🕊️</div>
    <div class="bird" style="animation-delay: 5s;">🕊️</div>
    <div class="container">
        <h1>I'm So Sorry, My Queen 👑</h1>
        <div class="puppy-box">
            <img src="https://placedog.net/500/500?id=5" alt="Puppy">
            <img src="https://placedog.net/500/500?id=8" alt="Puppy">
            <p><i>"Maan jao na please... dekho ye bhi sad hain."</i></p>
        </div>

        <div class="regret-note">
            <h2>My Heartfelt Regret... 🥺</h2>
            <div id="note-content"></div>
        </div>

        <h3>5000 Times I'm Sorry</h3>
        <div class="sorry-counter" id="sorry-box"></div>
        <h2 style="color: #ff4d6d;">I Love You Forever! ❤️</h2>
    </div>

    <script>
        // Heart Rain
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 300);

        // 5000 Sorries
        const sorryBox = document.getElementById('sorry-box');
        let sorryText = "";
        for(let i=1; i<=5000; i++) {
            sorryText += i + ". I am really sorry, please forgive me... 🥺❤️<br>";
        }
        sorryBox.innerHTML = sorryText;

        // 2000+ Words Regret Note
        const noteContainer = document.getElementById('note-content');
        const emotions = [
            "Main jaanta hoon maine tumhara dil dukhaya hai, aur ye soch kar mujhe bilkul accha nahi lag raha. ",
            "Tum meri zindagi ka sabse khoobsurat hissa ho, aur main tumhe khona nahi chahta. ",
            "Meri har galti ke liye main dil se maafi maangta hoon. Please mujhe ek mauka do. ",
            "Main vaada karta hoon ki main badlunga, tumhare liye, hamare liye. ",
            "Tumhari har muskurahat mere liye duniya ki sabse badi nayamat hai. ",
            "Mujhe maaf kar do, kyunki tumhare bina mera din shuru nahi hota aur raat nahi dhalti. ",
            "I am deeply sorry for everything. My world is empty without you. ",
            "Please meri jaan, ek baar muskura do aur sab pehle jaisa kar do. "
        ];
        
        let longLetter = "<b>Meri Pyaari Wifey,</b><br><br>";
        for(let j=0; j<200; j++) {
            longLetter += emotions[Math.floor(Math.random() * emotions.length)];
            if(j % 8 === 0) longLetter += "<br><br>";
        }
        longLetter += "<br><b>Tumhara Hamesha Ke Liye... ❤️</b>";
        noteContainer.innerHTML = longLetter;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feel Me... ❤️</title>
    <style>
        body, html {
            height: 100%; margin: 0;
            background-color: #1a1a1a; /* Dark & Sad theme initially */
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 2s;
            overflow: hidden;
        }

        .container { text-align: center; z-index: 10; }

        #heart {
            font-size: 100px;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s;
            filter: grayscale(100%);
        }

        .instruction {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* Background Effects */
        .rain { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Celebration Colors */
        .happy-bg { background-color: #ffeff2 !important; color: #ff4d6d !important; }
    </style>
</head>
<body>

    <div class="rain" id="rain-box"></div>

    <div class="container" id="main-content">
        <div id="heart">💔</div>
        <p class="instruction" id="msg">Mera dil toot gaya hai... isse sirf aap jod sakte ho.</p>
        <p id="sub-msg" style="font-size: 0.9rem; margin-top: 10px;">(Click on the heart to heal it)</p>
    </div>

    <script>
        const heart = document.getElementById('heart');
        const body = document.body;
        const msg = document.getElementById('msg');
        const subMsg = document.getElementById('sub-msg');

        heart.addEventListener('click', function() {
            // Change UI to Happy
            heart.innerHTML = "❤️";
            heart.style.filter = "grayscale(0%)";
            heart.style.transform = "scale(1.5)";
            body.classList.add('happy-bg');
            
            msg.innerHTML = "Aapne mujhe phir se zinda kar diya! ❤️<br><br>Maafi mangne se galti khatam nahi hoti, par aapka ek touch sab theek kar sakta hai. I Love You!";
            subMsg.style.display = "none";

            // Start Heart Rain instead of Sad Rain
            startHeartRain();
        });

        function startHeartRain() {
            setInterval(() => {
                const h = document.createElement('div');
                h.innerHTML = "❤️";
                h.style.position = "fixed";
                h.style.left = Math.random() * 100 + "vw";
                h.style.top = "-50px";
                h.style.fontSize = Math.random() * 20 + 20 + "px";
                h.style.transition = "transform 3s linear";
                h.style.zIndex = "5";
                document.body.appendChild(h);

                setTimeout(() => {
                    h.style.transform = "translateY(110vh)";
                }, 10);

                setTimeout(() => h.remove(), 4000);
            }, 300);
        }

        // Initial Sad Rain
        function startSadRain() {
            for(let i=0; i<30; i++) {
                const drop = document.createElement('div');
                drop.innerHTML = "💧";
                drop.style.position = "fixed";
                drop.style.left = Math.random() * 100 + "vw";
                drop.style.top = Math.random() * 100 + "vh";
                drop.style.opacity = "0.2";
                document.getElementById('rain-box').appendChild(drop);
            }
        }
        startSadRain();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Life ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { height: 100%; width: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Video Background */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.6); /* Video ko thoda dark kiya hai taaki text dikhe */
        }

        /* Overlay Content */
        .overlay {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
        }

        h1 { font-size: 3.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
        p { font-size: 1.5rem; max-width: 600px; line-height: 1.6; }

        /* Falling Hearts Animation */
        .heart {
            position: fixed;
            top: -10%;
            color: #ff4d6d;
            font-size: 25px;
            z-index: 10;
            user-select: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .forgive-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #ff4d6d;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
        }
        .forgive-btn:hover { transform: scale(1.1); background: #ff758c; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-romantic-couple-walking-on-the-beach-at-sunset-1579-large.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div class="overlay">
        <h1>I'm Sorry, My Love... 🥺</h1>
        <p>Har galti ki maafi hoti hai, aur meri galti toh sirf ye thi ki maine tumhe dukh pahunchaya. Please maan jao na? ❤️</p>
        <button class="forgive-btn" onclick="alert('I Love You Too! ❤️')">Maan Gayi? (Click Here)</button>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 200);
    </script>
</body>
</html>

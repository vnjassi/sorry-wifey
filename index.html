<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Request... 🥀</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .container { text-align: center; padding: 20px; z-index: 10; transition: 1s; }
        h1 { font-size: 2rem; margin-bottom: 40px; color: #eee; }

        .btn-box { display: flex; justify-content: center; gap: 30px; position: relative; height: 100px; width: 300px; margin: 0 auto; }
        
        .btn { padding: 15px 40px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-no { background: #ff4d6d; color: white; box-shadow: 0 0 20px rgba(255, 77, 109, 0.5); }
        .btn-yes { background: #444; color: #888; position: absolute; }

        /* Cinematic Background Video Effect */
        #video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.3; filter: grayscale(100%); }

        /* Hidden Surprise Section */
        #surprise { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f3; z-index: 100; flex-direction: column; justify-content: center; align-items: center; color: #ff4d6d; text-align: center; }
        #surprise h2 { font-size: 2.5rem; animation: heartBeat 1.2s infinite; }
        @keyframes heartBeat { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-bg">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-sad-man-sitting-on-the-beach-at-night-4028-large.mp4" type="video/mp4">
    </video>

    <div class="container" id="main-ui">
        <h1 id="main-text">Aapne kaha "Sab Khatam"... <br> Kya hamara pyaar itna kamzor tha? 💔</h1>
        <div class="btn-box">
            <button class="btn btn-no" onclick="showSurprise()">Nahi, I Love You</button>
            <button class="btn btn-yes" id="yesBtn" onmouseover="moveButton()">Yes, Khatam</button>
        </div>
    </div>

    <div id="surprise">
        <h2>I Knew It! ❤️</h2>
        <p style="font-size: 1.2rem; margin-top: 20px; color: #333;">Mera dil jaanta tha ki aap mujhe itni aasani se nahi chhod sakti.<br>Main apni har galti sudhaarne ke liye taiyaar hoon. Please maan jao na? 🥺</p>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXN6dzR3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCBmcm9tX2dpZmh5X2NhdCZjdD1z/v6aOebdGHvqW6nF5S7/giphy.gif" width="200" style="margin-top: 20px;">
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('yesBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            
            // Text changes as they try to click YES
            const texts = ["Soch lo ek baar...", "Sach mein?", "Dil pe hath rakh ke bolo?", "Aise mat karo...", "Ek mauka aur?"];
            document.getElementById('main-text').innerText = texts[Math.floor(Math.random() * texts.length)];
        }

        function showSurprise() {
            document.getElementById('surprise').style.display = 'flex';
            document.getElementById('main-ui').style.display = 'none';
            // Start heart rain
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            heart.style.color = '#ff4d6d';
            heart.style.transition = '4s linear';
            document.body.appendChild(heart);
            setTimeout(() => { heart.style.transform = 'translateY(110vh)'; }, 10);
            setTimeout(() => { heart.remove(); }, 4000);
        }
    </script>
</body>
</html>
